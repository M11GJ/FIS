server {
    listen 80;
    server_name localhost;

    # /shu-binran/ パスの設定
    location /shu-binran/ {
        root /usr/share/nginx/html;
        index index.html;
        # SPA のルーティング対応
        try_files $uri $uri/ /shu-binran/index.html;
    }

    # ルートへのアクセスを /shu-binran/ にリダイレクト
    location = / {
        return 301 /shu-binran/;
    }

    # エラーページ設定
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
