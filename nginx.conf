server {
    listen 80;
    server_name localhost;

    # ログ出力の設定を有効化
    access_log /var/log/nginx/access.log;

    # /shu-binran/ パスの設定
    location /shu-binran/ {
        root /usr/share/nginx/html;
        index index.html;
        # SPA のルーティング対応
        try_files $uri $uri/ /shu-binran/index.html;
    }

    # 管理用 API のプロキシ
    location /shu-binran/api/ {
        proxy_pass http://admin-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 更新履歴の表示 (API 経由で取得するため、直接参照は予備として残す)
    location /shu-binran/admin/history.txt {
        alias /usr/share/nginx/html/admin/update_history.log;
    }

    # ルートへのアクセスを /shu-binran/ にリダイレクト
    location = / {
        return 301 /shu-binran/;
    }

    # エラーページ設定
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
